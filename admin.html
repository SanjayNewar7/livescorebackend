<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Stream Manager</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <i class="fas fa-futbol"></i>
                <span>Live Stream Hub</span>
            </div>
            <div class="nav-links">
                <a href="index.html"><i class="fas fa-home"></i> Dashboard</a>
                <a href="admin.html" class="active"><i class="fas fa-cog"></i> Admin</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="admin-header">
            <h1><i class="fas fa-cog"></i> Admin Panel</h1>
            <p>Manage stream links for all matches across leagues</p>
        </div>

        <div class="admin-actions">
            <button onclick="syncAllLeagues()" class="admin-btn sync-btn">
                <i class="fas fa-sync"></i> Sync All Leagues
            </button>
            <button onclick="exportData()" class="admin-btn export-btn">
                <i class="fas fa-download"></i> Export Data
            </button>
            <button onclick="importData()" class="admin-btn import-btn">
                <i class="fas fa-upload"></i> Import Data
            </button>
            <button onclick="resetData()" class="admin-btn reset-btn">
                <i class="fas fa-trash"></i> Reset All
            </button>
        </div>

        <div class="admin-stats">
            <div class="admin-stat-card">
                <span class="admin-stat-number" id="adminTotalMatches">0</span>
                <span class="admin-stat-label">Total Matches</span>
            </div>
            <div class="admin-stat-card">
                <span class="admin-stat-number" id="adminTotalStreams">0</span>
                <span class="admin-stat-label">Total Streams</span>
            </div>
            <div class="admin-stat-card">
                <span class="admin-stat-number" id="adminLeagues">0</span>
                <span class="admin-stat-label">Leagues</span>
            </div>
        </div>

        <section class="admin-matches">
            <h2><i class="fas fa-list"></i> All Matches</h2>
            <div id="adminMatchesList"></div>
        </section>
    </div>

    <!-- Edit Modal -->
    <div class="modal" id="editModal">
        <div class="modal-content modal-large">
            <div class="modal-header">
                <h2 id="editModalTitle">Manage Stream Links</h2>
                <button class="modal-close" onclick="closeEditModal()">&times;</button>
            </div>
            <div class="modal-body" id="editModalBody"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
